<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMS - Project Management Dashboard</title>
    <meta name="description" content="Dashboard for managing Clients and Projects natively on the web.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="logo">
                <h2>📈 PMS Dashboard</h2>
            </div>
            <nav>
                <div class="nav-item active" data-target="dashboard">Overview</div>
                <div class="nav-item" data-target="projects">Projects</div>
                <div class="nav-item" data-target="clients">Clients</div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header>
                <h1>Welcome back, Admin</h1>
                <div class="user-profile">Company: <span id="company-name">Acme Corp</span></div>
            </header>

            <!-- Dashboard Overiew Tab -->
            <div id="dashboard" class="content-section active">
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Total Projects</h3>
                        <div class="stat-value" id="stat-projects">0</div>
                    </div>
                    <div class="stat-card">
                        <h3>Total Clients</h3>
                        <div class="stat-value" id="stat-clients">0</div>
                    </div>
                    <div class="stat-card">
                        <h3>Active Employees</h3>
                        <div class="stat-value" id="stat-employees">0</div>
                    </div>
                </div>

                <div class="quick-actions">
                    <h2>Quick Create Project</h2>
                    <form id="create-project-form" class="glass-form">
                        <div class="input-group">
                            <label>Project Name</label>
                            <input type="text" id="proj-name" required placeholder="e.g. Server Migration">
                        </div>
                        <div class="input-group">
                            <label>Budget ($)</label>
                            <input type="number" id="proj-budget" required placeholder="10000">
                        </div>
                        <div class="input-group">
                            <label>Project Type</label>
                            <select id="proj-type">
                                <option value="Web">Web Development</option>
                                <option value="Mobile">Mobile Application</option>
                                <option value="Data">Data Science</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Attach to Client</label>
                            <select id="proj-client"></select>
                        </div>
                        <button type="submit" class="btn-primary">Launch Project</button>
                    </form>
                </div>
            </div>

            <!-- Projects Tab -->
            <div id="projects" class="content-section">
                <h2>Active Projects</h2>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Type</th>
                                <th>Budget</th>
                                <th>Stage</th>
                            </tr>
                        </thead>
                        <tbody id="projects-table-body"></tbody>
                    </table>
                </div>
            </div>

            <!-- Clients Tab -->
            <div id="clients" class="content-section">
                <h2>Registered Clients</h2>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Client ID</th>
                                <th>Contact Name</th>
                                <th>Organization</th>
                                <th>Email</th>
                            </tr>
                        </thead>
                        <tbody id="clients-table-body"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
